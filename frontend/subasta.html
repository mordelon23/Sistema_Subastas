<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle de Subasta — Subastas ESCOM</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<nav class="navbar">
  <a href="subastas.html" class="navbar-brand">◆ <span>SUBASTAS</span> ESCOM</a>
  <div class="navbar-links">
    <a href="subastas.html">← Volver</a>
    <span class="ws-status">
      <span class="ws-dot" id="wsDot"></span>
      <span id="wsLabel">Conectando...</span>
    </span>
  </div>
</nav>

<div class="container" style="padding-top:2rem;">

  <div id="loadingState" class="loading">
    <div class="spinner"></div> Cargando subasta...
  </div>

  <div id="contenido" style="display:none;">
    <div class="subasta-detail">

      <div>
        <div id="tipoBadge" class="card" style="display:inline-block;padding:0.3rem 1rem;margin-bottom:1rem;"></div>
        <h1 id="titulo" style="font-size:1.8rem;margin-bottom:1rem;"></h1>

        <div class="card" style="margin-bottom:1.5rem;">
          <div class="precio-actual-big">
            <span>Precio actual</span>
            $<span id="precioActual">0</span>
          </div>
          <div style="color:var(--text-muted);font-size:0.85rem;margin-top:0.5rem;">
            Precio inicial: $<span id="precioInicial"></span> ·
            Incremento mínimo: $<span id="incremento"></span>
          </div>
        </div>

        <div class="countdown">
          <div class="countdown-label">Tiempo restante</div>
          <div class="countdown-time" id="countdown">--:--:--</div>
          <div class="countdown-label" id="fechaFinalLabel"></div>
        </div>

        <div style="margin-top:1.5rem;">
          <h3 style="margin-bottom:1rem;">Historial de ofertas</h3>
          <div id="ofertasList">
            <div class="loading"><div class="spinner"></div> Cargando ofertas...</div>
          </div>
        </div>
      </div>

      <div>
        <div class="card" id="cardOfertar">
          <h3 style="margin-bottom:1rem;">Realizar oferta</h3>
          <div id="alertOfertar" class="alert"></div>
          <div class="form-group">
            <label class="form-label">Tu oferta (mínimo $<span id="minimoOferta">0</span>)</label>
            <input type="number" id="montoOferta" class="form-control" placeholder="0.00" step="0.01">
          </div>
          <button class="btn btn-primary btn-full" id="btnOfertar" onclick="realizarOferta()">
            🔨 Ofertar ahora
          </button>
          <div id="loginWarning" style="display:none;text-align:center;margin-top:1rem;color:var(--text-muted);font-size:0.9rem;">
            <a href="login.html" style="color:var(--primary);">Inicia sesión</a> para hacer una oferta
          </div>
        </div>

        <div class="card" style="margin-top:1rem;">
          <h4 style="margin-bottom:0.75rem;font-size:0.9rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;">Información</h4>
          <div style="display:flex;flex-direction:column;gap:0.5rem;font-size:0.9rem;">
            <div style="display:flex;justify-content:space-between;">
              <span style="color:var(--text-muted);">Cantidad disponible</span>
              <span id="cantidad">—</span>
            </div>
            <div style="display:flex;justify-content:space-between;">
              <span style="color:var(--text-muted);">Inicio</span>
              <span id="fechaInicio">—</span>
            </div>
            <div style="display:flex;justify-content:space-between;">
              <span style="color:var(--text-muted);">Cierre</span>
              <span id="fechaFinal">—</span>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

</div>

<script>
  const API = 'http://localhost:8000';
  const WS_URL = 'ws://localhost:8000';
  const token = localStorage.getItem('token');
  const params = new URLSearchParams(window.location.search);
  const idSubasta = params.get('id');
  const TIPOS = { 1: 'Subasta Inglesa', 2: 'Subasta Holandesa', 3: 'Subasta Sellada' };

  let subasta = null;
  let ws = null;
  let countdownInterval = null;

  if (!idSubasta) window.location.href = 'subastas.html';

  async function cargarSubasta() {
    try {
      const [resSubasta, resOfertas] = await Promise.all([
        fetch(`${API}/subastas/${idSubasta}`),
        fetch(`${API}/ofertas/subasta/${idSubasta}`)
      ]);

      subasta = await resSubasta.json();
      const ofertas = await resOfertas.json();

      if (!resSubasta.ok) {
        window.location.href = 'subastas.html';
        return;
      }

      renderSubasta(subasta, ofertas);
      conectarWebSocket();
      iniciarCountdown(subasta.fecha_final);

    } catch (err) {
      console.error(err);
    }
  }

  function formatearFecha(fecha) {
    return new Date(fecha).toLocaleString('es-MX', {
      day: '2-digit', month: 'short', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }

  function renderSubasta(s, ofertas) {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('contenido').style.display = 'block';
    document.title = `Subasta #${s.id_subasta} — Subastas ESCOM`;

    document.getElementById('tipoBadge').textContent = TIPOS[s.cve_tipo_subasta] || 'Subasta';
    document.getElementById('tipoBadge').style.color = 'var(--primary)';
    document.getElementById('titulo').textContent = `Subasta #${s.id_subasta}`;
    document.getElementById('precioActual').textContent = s.precio_actual.toLocaleString();
    document.getElementById('precioInicial').textContent = s.precio_inicial.toLocaleString();
    document.getElementById('incremento').textContent = s.incremento.toLocaleString();
    document.getElementById('minimoOferta').textContent = (s.precio_actual + s.incremento).toLocaleString();
    document.getElementById('montoOferta').min = s.precio_actual + s.incremento;
    document.getElementById('montoOferta').value = s.precio_actual + s.incremento;
    document.getElementById('cantidad').textContent = s.cantidad;
    document.getElementById('fechaInicio').textContent = formatearFecha(s.fecha_inicio);
    document.getElementById('fechaFinal').textContent = formatearFecha(s.fecha_final);
    document.getElementById('fechaFinalLabel').textContent = formatearFecha(s.fecha_final);

    renderOfertas(ofertas);

    if (!token) {
      document.getElementById('btnOfertar').style.display = 'none';
      document.getElementById('loginWarning').style.display = 'block';
    }
  }

  function renderOfertas(ofertas) {
    const lista = document.getElementById('ofertasList');
    if (!ofertas.length) {
      lista.innerHTML = '<p style="color:var(--text-muted);font-size:0.9rem;">Aún no hay ofertas — ¡sé el primero!</p>';
      return;
    }
    lista.innerHTML = `<div class="ofertas-list">${ofertas.map((o, i) => `
      <div class="oferta-item">
        <div>
          <span class="oferta-monto">$${o.monto.toLocaleString()}</span>
          ${i === 0 ? ' 🏆' : ''}
        </div>
        <span class="oferta-fecha">${new Date(o.fecha).toLocaleTimeString('es-MX')}</span>
      </div>`).join('')}
    </div>`;
  }

  function iniciarCountdown(fechaFinal) {
    if (countdownInterval) clearInterval(countdownInterval);
    function actualizar() {
      const diff = new Date(fechaFinal) - new Date();
      if (diff <= 0) {
        document.getElementById('countdown').textContent = 'Finalizada';
        document.getElementById('countdown').style.color = 'var(--error)';
        document.getElementById('btnOfertar').disabled = true;
        clearInterval(countdownInterval);
        return;
      }
      const h = Math.floor(diff / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      document.getElementById('countdown').textContent =
        `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }
    actualizar();
    countdownInterval = setInterval(actualizar, 1000);
  }

  function conectarWebSocket() {
    ws = new WebSocket(`${WS_URL}/ws/subasta/${idSubasta}`);
    ws.onopen = () => {
      document.getElementById('wsDot').classList.add('connected');
      document.getElementById('wsLabel').textContent = 'En vivo';
    };
    ws.onmessage = (event) => {
      const msg = JSON.parse(event.data);
      if (msg.tipo === 'nueva_oferta') cargarSubasta();
    };
    ws.onclose = () => {
      document.getElementById('wsDot').classList.remove('connected');
      document.getElementById('wsLabel').textContent = 'Desconectado';
      setTimeout(conectarWebSocket, 3000);
    };
  }

  async function realizarOferta() {
    if (!token) {
      window.location.href = 'login.html';
      return;
    }
    const monto = parseFloat(document.getElementById('montoOferta').value);
    const minimo = subasta.precio_actual + subasta.incremento;
    const alertEl = document.getElementById('alertOfertar');
    const btn = document.getElementById('btnOfertar');

    if (!monto || monto < minimo) {
      alertEl.textContent = `La oferta mínima es $${minimo.toLocaleString()}`;
      alertEl.className = 'alert alert-error show';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Enviando oferta...';

    try {
      const res = await fetch(`${API}/ofertas/`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ monto, cve_subasta: parseInt(idSubasta) })
      });

      const data = await res.json();

      if (!res.ok) {
        alertEl.textContent = data.detail || 'Error al registrar la oferta';
        alertEl.className = 'alert alert-error show';
        return;
      }

      alertEl.textContent = `¡Oferta de $${monto.toLocaleString()} registrada!`;
      alertEl.className = 'alert alert-success show';

      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ tipo: 'nueva_oferta', monto, subasta: idSubasta }));
      }

      cargarSubasta();

    } catch (err) {
      alertEl.textContent = 'Error de conexión';
      alertEl.className = 'alert alert-error show';
    } finally {
      btn.disabled = false;
      btn.textContent = '🔨 Ofertar ahora';
    }
  }

  cargarSubasta();
</script>
</body>
</html>
